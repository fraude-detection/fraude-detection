version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraude-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://ep-summer-shadow-apullpsx-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      DB_USERNAME: neondb_owner
      DB_PASSWORD: npg_fFjHNhOg9Q3i
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend/promptly-fluent
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""   # nginx proxies /api/* to backend service
    container_name: fraude-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
